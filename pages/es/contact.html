<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contacto — Global MFT</title>
    <meta
      name="description"
      content="Contacte a Global MFT para consultoría en tecnología empresarial, consultas de productos ISV y oportunidades de asociación."
    />

    <!-- Turnstile -->
    <script
      src="https://challenges.cloudflare.com/turnstile/v0/api.js"
      async
      defer
    ></script>

    <link rel="stylesheet" href="../../css/global.css" />
    <style>
      /* (tu CSS original intacto) */
    </style>
  </head>

  <body>
    <div id="announce-bar"></div>
    <div id="site-header-placeholder"></div>

    <div class="page-banner">
      <div class="container">
        <div class="breadcrumb">
          <a href="../../es/index.html">Inicio</a><span>›</span
          ><span>Contacto</span>
        </div>
        <div class="eyebrow">Contáctenos</div>
        <h1>
          Iniciemos una <span style="color: var(--orange)">Conversación</span>
        </h1>
        <p
          style="
            color: var(--muted);
            max-width: 520px;
            font-size: 17px;
            margin-top: 16px;
          "
        >
          Ya sea que necesite un socio tecnológico para una iniciativa
          específica o quiera una evaluación integral de su panorama TI actual,
          estamos listos para ayudar.
        </p>
      </div>
    </div>

    <section class="section">
      <div class="container">
        <div class="contact-layout">
          <!-- COLUMNA IZQUIERDA -->
          <div>
            <!-- (todo tu contenido original intacto) -->
          </div>

          <!-- FORMULARIO -->
          <div class="contact-form-wrap reveal reveal-delay-2">
            <div class="form-title">Solicitar una Consulta</div>

            <form
              class="contact-form"
              id="contact-form"
              method="POST"
              action="/submit"
            >
              <div class="form-row">
                <div class="form-group">
                  <label>Nombre</label
                  ><input type="text" name="first_name" required />
                </div>
                <div class="form-group">
                  <label>Apellido</label
                  ><input type="text" name="last_name" required />
                </div>
              </div>

              <div class="form-group">
                <label>Empresa / Organización</label
                ><input type="text" name="company" required />
              </div>
              <div class="form-group">
                <label>Correo Corporativo</label
                ><input type="email" name="email" required />
              </div>
              <div class="form-group">
                <label>Teléfono (opcional)</label
                ><input type="tel" name="phone" />
              </div>

              <div class="form-group">
                <label>Área de Interés</label>
                <select name="interest" required>
                  <option value="">Seleccione un servicio o producto…</option>
                  <optgroup label="Servicios de Consultoría">
                    <option>Estrategia TI y Planificación</option>
                    <option>Soluciones en la Nube</option>
                    <option>Ciberseguridad y Cumplimiento</option>
                    <option>Transformación Digital</option>
                    <option>Analítica Empresarial</option>
                    <option>Telecom y Conectividad</option>
                    <option>Eficiencia Operacional</option>
                  </optgroup>
                  <optgroup label="Productos ISV">
                    <option value="zelle">
                      Plataforma de Verificación Zelle
                    </option>
                    <option value="ixm">Portal IXM (Lista de Espera)</option>
                    <option>Cumplimiento WhatsApp Business</option>
                  </optgroup>
                  <optgroup label="Otro">
                    <option>Alianza / Revendedor</option>
                    <option>Consulta General</option>
                  </optgroup>
                </select>
              </div>

              <div class="form-group">
                <label>¿Cómo Podemos Ayudarle?</label>
                <textarea name="message" required></textarea>
              </div>

              <!-- TURNSTILE -->
              <div
                style="display: flex; justify-content: center; margin: 20px 0"
              >
                <div
                  class="cf-turnstile"
                  data-sitekey="0x4AAAAAACvYqFbuqNwB9lmt"
                  data-callback="unlock"
                  data-theme="dark"
                ></div>
              </div>

              <!-- BOTÓN -->
              <button
                type="submit"
                class="btn btn-primary"
                id="submit-btn"
                disabled
                style="
                  width: 100%;
                  justify-content: center;
                  font-size: 14px;
                  padding: 14px;
                "
              >
                Enviar Consulta
              </button>

              <!-- MENSAJE DE ÉXITO -->
              <div
                id="success-msg"
                style="
                  display: none;
                  margin-top: 20px;
                  padding: 15px;
                  background: rgba(40, 167, 69, 0.15);
                  border: 1px solid #28a745;
                  color: #28a745;
                  border-radius: 6px;
                  text-align: center;
                  font-size: 14px;
                  font-weight: 600;
                "
              >
                ✓ Consulta enviada con éxito. ¡Le contactaremos pronto!
              </div>
            </form>
          </div>
        </div>
      </div>
    </section>

    <div id="site-footer-placeholder"></div>

    <script src="../../js/nav.js"></script>
    <script>
      GMFTNav.inject("../../", "es");
    </script>
    <script src="../../js/main.js"></script>

    <script>
      // Turnstile habilita el botón
      function unlock() {
        document.getElementById("submit-btn").disabled = false;
      }

      // Mostrar mensaje de éxito
      (function () {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get("status") === "success") {
          document.getElementById("success-msg").style.display = "block";
          const form = document.getElementById("contact-form");
          const fields = form.querySelectorAll(
            "input, select, textarea, button",
          );
          fields.forEach((f) => (f.disabled = true));
        }
      })();
    </script>
  </body>
</html>
