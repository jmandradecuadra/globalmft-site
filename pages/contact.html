<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Global MFT</title>
    <link rel="stylesheet" href="../css/global.css" />
    <script
      src="https://challenges.cloudflare.com/turnstile/v0/api.js"
      async
      defer
    ></script>
    <style>
      .contact-layout {
        display: grid;
        grid-template-columns: 1fr 500px;
        gap: 72px;
        align-items: start;
      }
      .contact-form-wrap {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 40px;
        position: relative;
      }
      .success-banner {
        display: none;
        background: rgba(232, 78, 27, 0.1);
        border: 1px solid var(--orange);
        color: #fff;
        padding: 30px;
        border-radius: 8px;
        text-align: center;
        margin-bottom: 40px;
      }
      .btn-primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        filter: grayscale(1);
      }
      @media (max-width: 1024px) {
        .contact-layout {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div id="site-header-placeholder"></div>

    <div class="page-banner">
      <div class="container">
        <h1>Start a <span style="color: var(--orange)">Conversation</span></h1>
      </div>
    </div>

    <section class="section">
      <div class="container">
        <div id="success-msg" class="success-banner">
          <h2 style="color: var(--orange); margin-bottom: 10px">
            Message Sent!
          </h2>
          <p>
            Thank you for reaching out to Global MFT. We have sent a
            confirmation email to your address.
          </p>
        </div>

        <div class="contact-layout" id="main-content">
          <div class="contact-form-wrap">
            <div class="form-title">Request a Consultation</div>
            <form
              class="contact-form"
              id="contact-form"
              method="POST"
              action="/submit"
            >
              <div class="form-row">
                <div class="form-group">
                  <label>First Name</label
                  ><input type="text" name="first_name" required />
                </div>
                <div class="form-group">
                  <label>Last Name</label
                  ><input type="text" name="last_name" required />
                </div>
              </div>
              <div class="form-group">
                <label>Company</label
                ><input type="text" name="company" required />
              </div>
              <div class="form-group">
                <label>Business Email</label
                ><input type="email" name="email" required />
              </div>
              <div class="form-group">
                <label>Area of Interest</label>
                <select name="interest" required>
                  <option value="IT Strategy">IT Strategy & Planning</option>
                  <option value="Cloud Solutions">Cloud Solutions</option>
                  <option value="Zelle Platform">
                    Zelle Verification Platform
                  </option>
                  <option value="Cybersecurity">
                    Cybersecurity & Compliance
                  </option>
                </select>
              </div>
              <div class="form-group">
                <label>How Can We Help?</label
                ><textarea name="message" required></textarea>
              </div>

              <div
                style="display: flex; justify-content: center; margin: 20px 0"
              >
                <div
                  class="cf-turnstile"
                  data-sitekey="0x4AAAAAACvYqFbuqNwB9lmt"
                  data-callback="unlockButton"
                ></div>
              </div>

              <button
                type="submit"
                id="submit-btn"
                class="btn btn-primary"
                disabled
                style="width: 100%; justify-content: center"
              >
                Submit Inquiry
              </button>
            </form>
          </div>
        </div>
      </div>
    </section>

    <div id="site-footer-placeholder"></div>
    <script src="../js/nav.js"></script>
    <script>
      GMFTNav.inject("../");
    </script>

    <script>
      // Activa el botón cuando el usuario pasa el reto de seguridad
      function unlockButton() {
        document.getElementById("submit-btn").disabled = false;
      }

      // Verifica si la URL tiene el parámetro de éxito para mostrar el banner
      (function () {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get("status") === "success") {
          document.getElementById("success-msg").style.display = "block";
          document.getElementById("main-content").style.display = "none";
        }
      })();
    </script>
  </body>
</html>
