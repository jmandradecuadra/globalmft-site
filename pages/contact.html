<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Global MFT</title>
    <link rel="stylesheet" href="../css/global.css" />
    <script
      src="https://challenges.cloudflare.com/turnstile/v0/api.js"
      async
      defer
    ></script>
    <style>
      /* ... (Estilos anteriores se mantienen igual) ... */
      .success-message {
        display: none;
        background: #d4edda;
        color: #155724;
        padding: 20px;
        border-radius: 8px;
        margin-bottom: 20px;
        text-align: center;
        font-weight: bold;
      }
      .btn-primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        filter: grayscale(1);
      }
    </style>
  </head>
  <body>
    <div id="site-header-placeholder"></div>

    <div class="page-banner">
      <div class="container">
        <h1>Start a <span style="color: var(--orange)">Conversation</span></h1>
      </div>
    </div>

    <section class="section">
      <div class="container">
        <div id="msg-success" class="success-message">
          Thank you! Your message has been sent. We will contact you soon.
        </div>

        <div class="contact-layout">
          <div class="contact-form-wrap">
            <div class="form-title">Request a Consultation</div>
            <form
              class="contact-form"
              id="contact-form"
              method="POST"
              action="/submit"
            >
              <div class="form-row">
                <div class="form-group">
                  <label>First Name</label>
                  <input type="text" name="first_name" required />
                </div>
                <div class="form-group">
                  <label>Last Name</label>
                  <input type="text" name="last_name" required />
                </div>
              </div>
              <div class="form-group">
                <label>Business Email</label>
                <input type="email" name="email" required />
              </div>
              <div class="form-group">
                <label>Area of Interest</label>
                <select name="interest" required>
                  <option value="General">General Inquiry</option>
                  <option value="Zelle">Zelle Verification</option>
                </select>
              </div>
              <div class="form-group">
                <label>Message</label>
                <textarea name="message" required></textarea>
              </div>

              <div
                class="turnstile-container"
                style="display: flex; justify-content: center; margin: 20px 0"
              >
                <div
                  class="cf-turnstile"
                  data-sitekey="0x4AAAAAACvYqFbuqNwB9lmt"
                  data-callback="enableBtn"
                ></div>
              </div>

              <button
                type="submit"
                id="submit-btn"
                class="btn btn-primary"
                disabled
                style="width: 100%"
              >
                Submit Inquiry
              </button>
            </form>
          </div>
        </div>
      </div>
    </section>

    <script>
      function enableBtn() {
        document.getElementById("submit-btn").disabled = false;
      }

      // Detectar éxito en la URL
      (function () {
        if (window.location.search.includes("status=success")) {
          document.getElementById("msg-success").style.display = "block";
          document.getElementById("contact-form").style.display = "none";
        }
      })();
    </script>
  </body>
</html>
