<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Global MFT</title>
    <link rel="stylesheet" href="../css/global.css" />
    <script
      src="https://challenges.cloudflare.com/turnstile/v0/api.js"
      async
      defer
    ></script>
    <style>
      .contact-layout {
        display: grid;
        grid-template-columns: 1fr 500px;
        gap: 72px;
        align-items: start;
      }
      .contact-info {
        display: flex;
        flex-direction: column;
        gap: 24px;
      }
      .ci-item {
        display: flex;
        align-items: flex-start;
        gap: 16px;
        padding: 20px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
      }
      .ci-body h4 {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 4px;
      }
      .ci-body p {
        font-size: 14px;
        color: var(--white);
      }

      .contact-form-wrap {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 40px;
        position: relative;
        overflow: hidden;
      }
      .contact-form-wrap::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(90deg, var(--orange), var(--blue-mid));
      }

      /* BARRA VERDE DE ÉXITO REFORZADA */
      #success-msg {
        display: none;
        margin-top: 24px;
        padding: 16px;
        background: rgba(40, 167, 69, 0.2) !important;
        border: 1px solid #28a745 !important;
        color: #28a745 !important;
        border-radius: 8px;
        text-align: center;
        font-size: 14px;
        font-weight: 700;
      }

      .btn-primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        filter: grayscale(1);
      }
      @media (max-width: 1024px) {
        .contact-layout {
          grid-template-columns: 1fr;
          gap: 40px;
        }
      }
    </style>
  </head>
  <body>
    <div id="site-header-placeholder"></div>

    <div class="page-banner">
      <div class="container">
        <h1>Start a <span style="color: var(--orange)">Conversation</span></h1>
        <p
          style="
            color: var(--muted);
            max-width: 520px;
            font-size: 17px;
            margin-top: 16px;
          "
        >
          We are ready to assess your IT landscape and help your business grow.
        </p>
      </div>
    </div>

    <section class="section">
      <div class="container">
        <div class="contact-layout">
          <div>
            <h2 style="margin-bottom: 32px">
              Reach <span class="text-orange">Us</span>
            </h2>
            <div class="contact-info">
              <div class="ci-item">
                <div class="ci-body">
                  <h4>Website</h4>
                  <p>globalmft.cobranext.pro</p>
                </div>
              </div>
              <div class="ci-item">
                <div class="ci-body">
                  <h4>Email</h4>
                  <p>info@globalmft.cobranext.pro</p>
                </div>
              </div>
            </div>
          </div>

          <div class="contact-form-wrap">
            <div
              class="form-title"
              style="
                font-size: 22px;
                font-weight: 700;
                color: #fff;
                margin-bottom: 28px;
              "
            >
              Request a Consultation
            </div>
            <form
              class="contact-form"
              id="contact-form"
              method="POST"
              action="/submit"
            >
              <div class="form-row">
                <div class="form-group">
                  <label>First Name</label
                  ><input
                    type="text"
                    name="first_name"
                    placeholder="Jane"
                    required
                  />
                </div>
                <div class="form-group">
                  <label>Last Name</label
                  ><input
                    type="text"
                    name="last_name"
                    placeholder="Smith"
                    required
                  />
                </div>
              </div>
              <div class="form-group">
                <label>Email</label
                ><input
                  type="email"
                  name="email"
                  placeholder="jane@acmecorp.com"
                  required
                />
              </div>
              <div class="form-group">
                <label>Company</label
                ><input
                  type="text"
                  name="company"
                  placeholder="Acme Corp"
                  required
                />
              </div>
              <div class="form-group">
                <label>Interest</label>
                <select name="interest" required>
                  <option value="">Select a service...</option>
                  <option value="IT Strategy">IT Strategy & Planning</option>
                  <option value="Cloud Solutions">Cloud Solutions</option>
                  <option value="Zelle Platform">
                    Zelle Verification Platform
                  </option>
                </select>
              </div>
              <div class="form-group">
                <label>Message</label
                ><textarea
                  name="message"
                  placeholder="Describe your needs..."
                  required
                ></textarea>
              </div>

              <div
                style="display: flex; justify-content: center; margin: 20px 0"
              >
                <div
                  class="cf-turnstile"
                  data-sitekey="0x4AAAAAACvYqFbuqNwB9lmt"
                  data-callback="unlock"
                ></div>
              </div>

              <button
                type="submit"
                id="submit-btn"
                class="btn btn-primary"
                disabled
                style="width: 100%; justify-content: center; padding: 14px"
              >
                Submit Inquiry
              </button>

              <div id="success-msg">
                ✓ Inquiry sent successfully. We will contact you soon!
              </div>
            </form>
          </div>
        </div>
      </div>
    </section>

    <script src="../js/nav.js"></script>
    <script>
      GMFTNav.inject("../");
    </script>

    <script>
      function unlock() {
        document.getElementById("submit-btn").disabled = false;
      }

      (function () {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get("status") === "success") {
          document.getElementById("success-msg").style.display = "block";
          document.getElementById("submit-btn").disabled = true;
          document.getElementById("submit-btn").innerHTML = "Message Sent";
        }
      })();
    </script>
  </body>
</html>
