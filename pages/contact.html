<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contacto — Global MFT</title>
    <meta
      name="description"
      content="Contacte a Global MFT para consultoría en tecnología empresarial y consultas de productos ISV."
    />

    <script
      src="https://challenges.cloudflare.com/turnstile/v0/api.js"
      async
      defer
    ></script>

    <link rel="stylesheet" href="../../css/global.css" />
    <style>
      .contact-layout {
        display: grid;
        grid-template-columns: 1fr 500px;
        gap: 72px;
        align-items: start;
      }
      .contact-info {
        display: flex;
        flex-direction: column;
        gap: 24px;
      }
      .ci-item {
        display: flex;
        align-items: flex-start;
        gap: 16px;
        padding: 20px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        transition: border-color var(--transition);
      }
      .ci-item:hover {
        border-color: rgba(232, 78, 27, 0.25);
      }
      .ci-icon {
        width: 40px;
        height: 40px;
        background: var(--orange-soft);
        border: 1px solid rgba(232, 78, 27, 0.2);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        flex-shrink: 0;
      }
      .ci-body h4 {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 4px;
      }
      .ci-body p {
        font-size: 14px;
        color: var(--white);
      }
      .ci-body a {
        color: var(--orange);
        transition: opacity var(--transition);
      }

      .contact-form-wrap {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 40px;
        position: relative;
        overflow: hidden;
      }
      .contact-form-wrap::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(90deg, var(--orange), var(--blue-mid));
      }

      /* ESTILO DEL MENSAJE DE ÉXITO */
      #success-msg {
        display: none;
        margin-top: 20px;
        padding: 15px;
        background: rgba(40, 167, 69, 0.15);
        border: 1px solid #28a745;
        color: #28a745;
        border-radius: 6px;
        text-align: center;
        font-size: 14px;
        font-weight: 600;
      }

      .btn-primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        filter: grayscale(1);
      }

      @media (max-width: 1024px) {
        .contact-layout {
          grid-template-columns: 1fr;
          gap: 40px;
        }
      }
    </style>
  </head>
  <body>
    <div id="announce-bar"></div>
    <div id="site-header-placeholder"></div>

    <div class="page-banner">
      <div class="container">
        <div class="breadcrumb">
          <a href="../../es/index.html">Inicio</a><span>›</span
          ><span>Contacto</span>
        </div>
        <div class="eyebrow">Contáctenos</div>
        <h1>
          Iniciemos una <span style="color: var(--orange)">Conversación</span>
        </h1>
      </div>
    </div>

    <section class="section">
      <div class="container">
        <div class="contact-layout">
          <div>
            <div class="reveal">
              <div class="eyebrow">Información de Contacto</div>
              <h2 style="margin-bottom: 32px">
                Cómo <span class="text-orange">Contactarnos</span>
              </h2>
            </div>
            <div class="contact-info reveal">
              <div class="ci-item">
                <div class="ci-icon">🌐</div>
                <div class="ci-body">
                  <h4>Sitio Web</h4>
                  <p>
                    <a href="https://globalmft.cobranext.com"
                      >globalmft.cobranext.com</a
                    >
                  </p>
                </div>
              </div>
              <div class="ci-item">
                <div class="ci-icon">📧</div>
                <div class="ci-body">
                  <h4>Consultas</h4>
                  <p>
                    <a href="mailto:info@globalmft.cobranext.com"
                      >info@globalmft.cobranext.com</a
                    >
                  </p>
                </div>
              </div>
            </div>
          </div>

          <div class="contact-form-wrap reveal reveal-delay-2">
            <div
              class="form-title"
              style="
                font-size: 22px;
                font-weight: 700;
                color: #fff;
                margin-bottom: 28px;
              "
            >
              Solicitar Consulta
            </div>

            <form
              class="contact-form"
              id="contact-form"
              method="POST"
              action="/submit"
            >
              <div class="form-row">
                <div class="form-group">
                  <label>Nombre</label
                  ><input
                    type="text"
                    name="first_name"
                    placeholder="Juan"
                    required
                  />
                </div>
                <div class="form-group">
                  <label>Apellido</label
                  ><input
                    type="text"
                    name="last_name"
                    placeholder="Pérez"
                    required
                  />
                </div>
              </div>
              <div class="form-group">
                <label>Empresa</label
                ><input
                  type="text"
                  name="company"
                  placeholder="Mi Empresa S.A."
                  required
                />
              </div>
              <div class="form-group">
                <label>Correo Corporativo</label
                ><input
                  type="email"
                  name="email"
                  placeholder="juan@empresa.com"
                  required
                />
              </div>

              <div class="form-group">
                <label>Área de Interés</label>
                <select name="interest" required>
                  <option value="">Seleccione...</option>
                  <option value="Estrategia">Estrategia TI</option>
                  <option value="Cloud">Soluciones Cloud</option>
                  <option value="Zelle">Plataforma Zelle</option>
                </select>
              </div>
              <div class="form-group">
                <label>Mensaje</label
                ><textarea
                  name="message"
                  placeholder="¿Cómo podemos ayudar?"
                  required
                ></textarea>
              </div>

              <div
                style="display: flex; justify-content: center; margin: 20px 0"
              >
                <div
                  class="cf-turnstile"
                  data-sitekey="0x4AAAAAACvYqFbuqNwB9lmt"
                  data-callback="unlock"
                  data-theme="dark"
                ></div>
              </div>

              <button
                type="submit"
                id="submit-btn"
                class="btn btn-primary"
                disabled
                style="width: 100%; justify-content: center; padding: 14px"
              >
                Enviar Consulta
              </button>

              <div id="success-msg">
                ✓ Consulta enviada con éxito. ¡Le contactaremos pronto!
              </div>
            </form>
          </div>
        </div>
      </div>
    </section>

    <div id="site-footer-placeholder"></div>

    <script src="../../js/nav.js"></script>
    <script>
      GMFTNav.inject("../../", "es");
    </script>
    <script src="../../js/main.js"></script>

    <script>
      // Función que llama Turnstile al verificar con éxito
      function unlock() {
        document.getElementById("submit-btn").disabled = false;
      }

      // Manejo del estado después del envío
      (function () {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get("status") === "success") {
          document.getElementById("success-msg").style.display = "block";
          const form = document.getElementById("contact-form");
          const fields = form.querySelectorAll(
            "input, select, textarea, button",
          );
          fields.forEach((f) => (f.disabled = true));
        }
      })();
    </script>
  </body>
</html>
